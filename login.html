<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AnimeHub</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1a1a1a;
    padding:30px;
    border-radius:12px;
    width:300px;
    box-shadow:0 0 20px rgba(229,9,20,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

p{
    text-align:center;
}

a{
    color:#e50914;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎌 AnimeHub Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="signup">Sign Up</button>
    <button id="login">Login</button>

    <p>
        <a href="index.html">🏠 Back Home</a>
    </p>
</div>

<script type="module" src="login.js"></script>

</body>
</html>
